<mat-card>
  <div style="width: 550px; margin-left: 950px; font-size: small">
    <mat-card-title style="font-size: small"><b>Usuário: </b>{{ this.nomeLogado }}</mat-card-title>
  </div>
  <div style="height: 50px; margin-left: 20px;">
    <mat-card-title><b>Consulta de Autorizatários</b></mat-card-title>
  </div>
    <div>
        <form>
            <mat-form-field appearance="outline" style="width: 550px; margin-left: 20px; margin-right: 30px;">
              <mat-label >Nome Autorizatário</mat-label>
              <input matInput placeholder="Nome Autorizatário" style="margin-right: 20px;" [(ngModel)]="permissionarioFiltro.nomePermissionario" name="nomePermissionario">
              <button mat-button *ngIf="permissionarioFiltro.nomePermissionario" matSuffix aria-label="Clear" (click)="permissionarioFiltro.nomePermissionario=''">
                <i class="material-icons black v-middle">
                  close
                </i>
              </button>
            </mat-form-field>

            <mat-form-field appearance="outline" style="width: 250px; margin-left: 20px; margin-right: 30px;">
              <mat-label >CPF Autorizatário</mat-label>
              <input type="number" matInput placeholder="CPF Autorizatário" style="margin-right: 20px;" [(ngModel)]="permissionarioFiltro.cpfPermissionario" name="cpfPermissionario">
              <button mat-button *ngIf="permissionarioFiltro.cpfPermissionario" matSuffix aria-label="Clear" (click)="permissionarioFiltro.cpfPermissionario=''">
                <i class="material-icons black v-middle">
                  close
                </i>
              </button>
            </mat-form-field>

            <mat-form-field appearance="outline" style="width: 250px; margin-left: 20px; margin-right: 30px;">
              <mat-label >CNH Autorizatário</mat-label>
              <input type="number" matInput placeholder="CNH Autorizatário" style="margin-right: 20px;" [(ngModel)]="permissionarioFiltro.cnhPermissionario" name="cnhPermissionario">
              <button mat-button *ngIf="permissionarioFiltro.cnhPermissionario" matSuffix aria-label="Clear" (click)="permissionarioFiltro.cnhPermissionario=''">
                <i class="material-icons black v-middle">
                  close
                </i>
              </button>
            </mat-form-field>

        </form>
    </div>
</mat-card>
<br>
<div class="btn-toolbar" style="float: right;">
    <div class="btn-group">
      <button color="primary" class="buttonConsultar" style="width: 200px; margin-left: 30px;" mat-raised-button (click) = "consultarPermissionariosComFiltros()">
        Consultar
      </button>
    </div>
    <div class="btn-group">
        <button style="width: 200px; background-color: #04AA6D;"  class="buttonInserir" mat-raised-button (click) = "navegarInserirPermissionario()">
            Novo Autorizatário
        </button>
    </div>
    <div class="btn-group">
      <button style="width: 200px; background-color: darkgray;"  class="buttonVoltar" mat-raised-button (click) = "voltarPaginaPrincipal()">
        Voltar
      </button>
    </div>
</div>
<br>
<br>
<br>
<div class="mat-elevation-z4">
    <table class="table table-striped table-hover" style="outline-color: black;">
         <thead style="background-color: gray;">
            <tr style="color: white;">
              <th style="text-align: left;">Nome Autorizatário</th>
              <th style="text-align: center;">CPF Autorizatário</th>
              <th style="text-align: center;">CNH Autorizatário</th>
              <th style="text-align: center;">Status</th>
              <th style="text-align: center;">Ações</th>
            </tr>
         </thead>
         <tbody>
            <tr *ngFor="let row of permissionarios | paginate: { itemsPerPage: pageSize, currentPage: pageIndex }">
              <td style="text-align: left;">{{row.nomePermissionario}}</td>
              <td style="text-align: center;">{{row.cpfPermissionario}}</td>
              <td style="text-align: center;">{{row.cnhPermissionario}}</td>
              <td style="text-align: center;">{{row.status}}</td>

              <td style="text-align: center;">
                <button title="Editar" [disabled]="row.status == 'INATIVO'" mat-icon-button color="primary" (click) = "navegarEditarPermissionario(row)" aria-label="Editar Autorizatário">
                    <mat-icon>edit</mat-icon>
                </button>
                <button title="Detalhar" mat-icon-button color="primary" (click) = "navegarDetalharPermissionario(row)">
                  <mat-icon>lists</mat-icon>
                </button>
                <button title="Gerar Registro do Condutor" [disabled]="row.status == 'INATIVO'" mat-icon-button color="primary" (click) = "gerarRegistroCondutor(row.cpfPermissionario)" aria-label="Gerar Resgistro do Condutor">
                  <mat-icon>article</mat-icon>
                </button>
                <button title="Gerar Termo de Autorização de Serviço" [disabled]="row.status == 'INATIVO'" mat-icon-button color="primary" (click) = "gerarTermoAutorizacaoServico(row.cpfPermissionario)" aria-label="Gerar TAS">
                  <mat-icon>verified</mat-icon>
                </button>
                <button title="Remover" [disabled]="row.status == 'INATIVO'" mat-icon-button color="primary" (click) = "openModal(row.idPermissionario, row.nomePermissionario)" aria-label="Remover Autorizatário">
                    <mat-icon>delete</mat-icon>
                </button>
              </td>
            </tr>
         </tbody>
    </table>
  <mat-paginator
    #paginator
    (page)="onPageChange($event)"
    [length]= "totalPermissionarios"
    [pageSize]= "pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]= "[10, 15, 20]"
    [showFirstLastButtons]>
  </mat-paginator>

</div>
